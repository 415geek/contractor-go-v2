# 推送到 main 即自动在 VPS 上执行部署（直接部署）
# 需在仓库 Settings → Secrets：VPS_HOST、VPS_USER、VPS_SSH_KEY
name: Deploy web to VPS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            /usr/local/bin/contractor-web-deploy.sh
